<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联通余量面板</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">联通余量面板</div>
      <div class="topbar-right">
        <span class="login-badge">已登录</span>
        <button class="btn-logout" id="btn-logout">退出</button>
      </div>
    </header>

    <main class="container">
      <!-- 顶部统计卡片 -->
      <section class="summary-grid">
        <div class="summary-card">
          <div class="summary-top">
            <div class="summary-val" id="s-remain">—</div>
            <div class="summary-label">剩余流量</div>
          </div>
          <div class="card-progress">
            <div class="card-progress-bar is-blue" id="s-remain-bar"></div>
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-top">
            <div class="summary-val" id="s-used">—</div>
            <div class="summary-label">已用流量</div>
          </div>
          <div class="card-progress">
            <div class="card-progress-bar is-amber" id="s-used-bar"></div>
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-top">
            <div class="summary-val" id="s-total">—</div>
            <div class="summary-label">套餐总量</div>
          </div>
          <div class="card-progress">
            <div class="card-progress-bar is-gray" id="s-total-bar"></div>
          </div>
        </div>

        <div class="summary-card summary-card--highlight">
          <div class="summary-fill" id="s-pct-fill"></div>
          <div class="summary-top">
            <div class="summary-val" id="s-pct">—</div>
            <div class="summary-label">使用率</div>
          </div>
          <div class="card-progress">
            <div class="card-progress-bar" id="s-pct-bar"></div>
          </div>
        </div>
      </section>

      <!-- 流量余量 -->
      <section class="card">
        <div class="card-header">
          <div class="card-title">流量余量</div>
          <button class="btn-refresh" id="btn-refresh">刷新</button>
        </div>

        <div class="big-progress">
          <div class="big-progress-bg">
            <div class="big-progress-bar" id="main-bar"></div>
          </div>
          <div class="big-progress-meta">
            <span id="bar-used-lbl">已用 —</span>
            <span id="bar-total-lbl">共 —</span>
          </div>
        </div>

        <div id="pkg-list">加载中...</div>
      </section>

      <!-- 下方占位卡片 -->
      <section class="bottom-grid">
        <div class="card">
          <div class="card-header">
            <div class="card-title">速率 & QCI</div>
          </div>
          <div class="placeholder">查询中...</div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">已订业务</div>
          </div>
          <div class="placeholder">查询中...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
