<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联通余量面板</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>📶</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">📶</span>
          <span>联通余量面板</span>
        </div>
        <div id="header-user" style="display:none" class="header-right">
          <span id="header-phone" class="phone-tag"></span>
          <button class="btn-ghost" onclick="logout()">退出</button>
        </div>
      </div>
    </header>

    <!-- ===== 仪表盘 ===== -->
    <main id="page-dash" class="page-dash">
      <div class="container">

        <!-- 套餐名称 -->
        <div id="package-name-display" class="package-name-card" style="display:none;">
          <div class="package-name-inner">
            当前套餐：<span id="main-package-name"></span>
          </div>
        </div>

        <!-- 顶部汇总 -->
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-val" id="s-remain">—</div>
            <div class="summary-label">剩余流量</div>
          </div>
          <div class="summary-card">
            <div class="summary-val" id="s-used">—</div>
            <div class="summary-label">已用流量</div>
          </div>
          <div class="summary-card">
            <div class="summary-val" id="s-total">—</div>
            <div class="summary-label">套餐总量</div>
          </div>
          <div class="summary-card accent">
            <div class="summary-val" id="s-pct">—</div>
            <div class="summary-label">使用率</div>
          </div>
        </div>

        <!-- 流量使用情况（主卡片） -->
        <div class="card flow-card">
          <div class="card-header">
            <span class="card-title">📶 流量使用情况</span>
            <button class="btn-refresh" id="btn-refresh" onclick="refreshAll()">
              刷新
            </button>
          </div>
          <div class="big-progress">
            <div class="big-bar-bg"><div class="big-bar-fill" id="main-bar" style="width:0%"></div></div>
            <div class="bar-labels">
              <span id="bar-used-lbl">已用 —</span>
              <span id="bar-total-lbl">共 —</span>
            </div>
          </div>
          <div id="pkg-list" class="pkg-list">
            <div class="loading-row">加载中...</div>
          </div>
        </div>

        <div class="side-grid">
          <!-- 速率 & QCI -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">📡 速率 &amp; QCI</span>
              <span class="net-badge" id="net-badge">5G</span>
            </div>
            <div id="speed-area">
              <div class="loading-row">查询中...</div>
            </div>
          </div>

          <!-- 语音使用情况 -->
          <div class="card voice-card" id="voice-card" style="display:none">
            <div class="card-header">
              <span class="card-title">📞 语音使用情况</span>
            </div>
            <div id="voice-area">
              <div class="loading-row">查询中...</div>
            </div>
          </div>
        </div>

        <div class="page-footer">数据来自联通官方接口 · 本地反向代理转发</div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
