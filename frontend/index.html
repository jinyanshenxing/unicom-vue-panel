<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联通余量面板</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span>联通余量面板</span>
      </div>
      <div class="header-right">
        <span id="phone-tag" class="phone-tag" style="display:none;"></span>
        <button id="btn-logout" class="btn ghost" type="button">退出</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">

      <!-- 登录区 -->
      <section id="login-card" class="card">
        <div class="card-title">流量 · 速率 · 套餐查询</div>

        <div class="form-grid">
          <div class="form-item">
            <label>短信验证码</label>
            <input id="mobile" class="input" placeholder="手机号" />
          </div>
          <div class="form-item row">
            <input id="sms-code" class="input" placeholder="验证码" />
            <button id="btn-send-code" class="btn" type="button">获取验证码</button>
          </div>

          <div class="form-item">
            <label>ECS Token</label>
            <input id="ecs-token" class="input" placeholder="ECS Token" />
          </div>
          <div class="form-item">
            <label>手机号 (可选,仅用于界面展示)</label>
            <input id="mobile-display" class="input" placeholder="手机号 (可选,仅用于界面展示)" />
          </div>
        </div>

        <div class="form-actions">
          <button id="btn-login" class="btn primary" type="button">验证并登录</button>
        </div>

        <div class="tip">
          如何获取 ECS Token: 打开浏览器访问 m.client.10010.com 并登录，在开发者工具 → Application → Cookies 中找到 ecs_token 字段复制即可。<br />
          数据仅用于查询，不存储任何个人信息
        </div>
      </section>

      <!-- 仪表盘 -->
      <section id="dash" class="dash" style="display:none;">
        <div class="summary-grid">
          <div class="summary-card accent">
            <div id="s-remain" class="summary-val">—</div>
            <div class="summary-label">剩余流量</div>
          </div>
          <div class="summary-card">
            <div id="s-used" class="summary-val">—</div>
            <div class="summary-label">已用流量</div>
          </div>
          <div class="summary-card">
            <div id="s-total" class="summary-val">—</div>
            <div class="summary-label">套餐总量</div>
          </div>
          <div class="summary-card">
            <div id="s-pct" class="summary-val">—</div>
            <div class="summary-label">使用率</div>
          </div>
        </div>

        <!-- 流量余量 -->
        <section class="card">
          <div class="card-head">
            <div class="card-title">流量使用情况</div>
            <button id="btn-refresh-flow" class="btn ghost" type="button">刷新</button>
          </div>

          <div class="progress-wrap">
            <div class="progress-bg">
              <div id="main-bar" class="progress-bar"></div>
            </div>
            <div class="progress-meta">
              <span id="main-used-label">已用 —</span>
              <span id="main-total-label">共 —</span>
            </div>
          </div>

          <div class="flow-section-header">流量余量</div>
          <div id="pkg-list">加载中...</div>
        </section>

        <!-- 语音使用情况 -->
        <section class="card">
          <div class="card-head">
            <div class="card-title">语音使用情况</div>
          </div>

          <div class="summary-grid inner-grid">
            <div class="summary-card accent">
              <div id="v-remain" class="summary-val">—</div>
              <div class="summary-label">剩余语音</div>
            </div>
            <div class="summary-card">
              <div id="v-used" class="summary-val">—</div>
              <div class="summary-label">已用语音</div>
            </div>
            <div class="summary-card">
              <div id="v-total" class="summary-val">—</div>
              <div class="summary-label">套餐总量</div>
            </div>
            <div class="summary-card">
              <div id="v-pct" class="summary-val">—</div>
              <div class="summary-label">使用率</div>
            </div>
          </div>

          <div class="progress-wrap">
            <div class="progress-bg">
              <div id="voice-bar" class="progress-bar"></div>
            </div>
            <div class="progress-meta">
              <span id="voice-used-label">已用 —</span>
              <span id="voice-total-label">共 —</span>
            </div>
          </div>
        </section>

        <!-- 速率 & QCI -->
        <section class="card">
          <div class="card-head">
            <div class="card-title">速率 & QCI</div>
          </div>
          <div id="speed-area">查询中...</div>
        </section>

        <!-- 已订业务 -->
        <section class="card">
          <button id="biz-toggle" class="collapse-toggle" type="button">
            <span>已订业务</span>
            <span id="biz-arrow">▼</span>
          </button>
          <div id="biz-wrap" style="display:none;">
            <div id="biz-area">查询中...</div>
          </div>
        </section>

        <div class="footer-tip">数据来自联通官方接口 · 本地反向代理转发</div>
      </section>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
