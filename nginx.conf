server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 反向代理：联通主接口
    location /api/unicom/ {
        proxy_pass https://m.client.10010.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host m.client.10010.com;
        proxy_set_header Referer https://m.client.10010.com/;
        proxy_set_header User-Agent "Mozilla/5.0 (Linux; Android 10;) AppleWebKit/537.36 Chrome/91.0 Mobile Safari/537.36";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, ecs_token, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # 反向代理：登录验证接口
    location /api/login/ {
        proxy_pass https://loginxhm.10010.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host loginxhm.10010.com;
        proxy_set_header Referer https://m.client.10010.com/;
        proxy_set_header User-Agent "Mozilla/5.0 (Linux; Android 10;) AppleWebKit/537.36 Chrome/91.0 Mobile Safari/537.36";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, ecs_token, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # SPA 路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
