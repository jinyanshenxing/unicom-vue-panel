<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联通流量面板</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">

    <!-- 顶部 -->
    <header class="header">
      <div>
        <div class="header-title">联通流量面板</div>
        <div class="login-sub">登录后查看套餐流量、速率与已订业务</div>
      </div>

      <div id="header-user" class="header-user" style="display:none;">
        <span id="header-phone">已登录</span>
        <button class="btn-ghost" onclick="logout()">退出登录</button>
      </div>
    </header>

    <!-- 登录页 -->
    <section id="page-login">
      <div class="login-wrap">
        <div class="login-title">登录</div>
        <div class="login-sub">支持短信验证码登录 / ECS Token 登录</div>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchLoginTab('sms', this)">短信登录</button>
          <button class="tab-btn" onclick="switchLoginTab('token', this)">Token 登录</button>
        </div>

        <!-- 短信登录 -->
        <div id="login-sms">
          <div class="form-group">
            <input id="inp-phone" type="tel" placeholder="请输入联通手机号" maxlength="11" />
          </div>

          <div id="sms-code-group" style="display:none;">
            <div class="form-group">
              <input id="inp-code" type="text" placeholder="请输入短信验证码" maxlength="8" />
            </div>
            <div class="form-group" style="display:flex;justify-content:flex-end;">
              <button id="btn-resend" class="btn-ghost" onclick="sendSms()" disabled>60s 后重发</button>
            </div>
          </div>

          <div class="form-group">
            <button id="btn-sms-submit" class="btn-primary" style="width:100%;" onclick="handleSmsLogin()">获取验证码</button>
          </div>

          <div id="msg-sms" class="msg"></div>
        </div>

        <!-- Token 登录 -->
        <div id="login-token" style="display:none;">
          <div class="form-group">
            <input id="inp-token-phone" type="tel" placeholder="手机号（可选，用于界面显示）" maxlength="11" />
          </div>

          <div class="form-group">
            <input id="inp-token" type="text" placeholder="请输入 ECS Token" />
          </div>

          <div class="form-group">
            <button class="btn-primary" style="width:100%;" onclick="handleTokenLogin()">验证并登录</button>
          </div>

          <div id="msg-token" class="msg"></div>
        </div>
      </div>
    </section>

    <!-- 面板页 -->
    <section id="page-dash" style="display:none;">

      <!-- 顶部总览统计 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div id="s-remain" class="stat-value">—</div>
          <div class="stat-label">剩余流量</div>
        </div>

        <div class="stat-card">
          <div id="s-used" class="stat-value">—</div>
          <div class="stat-label">已用流量</div>
        </div>

        <div class="stat-card">
          <div id="s-total" class="stat-value">—</div>
          <div class="stat-label">套餐总量</div>
        </div>

        <div class="stat-card active">
          <div id="s-pct" class="stat-value">0%</div>
          <div class="stat-label">使用率</div>
        </div>
      </div>

      <!-- 流量卡片 -->
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">流量余量</div>
          <div class="panel-tools">
            <button id="btn-refresh" class="refresh-btn" onclick="refreshAll()">⟳ 刷新</button>
          </div>
        </div>

        <div class="flow-summary">
          <div class="main-bar-bg">
            <div id="main-bar"></div>
          </div>
          <div class="bar-labels">
            <span id="bar-used-lbl">已用 —</span>
            <span id="bar-total-lbl">共 —</span>
          </div>
        </div>

        <div id="pkg-list">
          <div class="loading-row">
            <div class="spinner"></div>
            请先登录后查询
          </div>
        </div>
      </section>

      <!-- 下半区 -->
      <div class="two-col">

        <!-- 速率 -->
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">速率 & QCI</div>
            <div class="panel-tools">
              <span id="net-badge" class="badge">5G</span>
            </div>
          </div>

          <div id="speed-area">
            <div class="loading-row">
              <div class="spinner"></div>
              查询中...
            </div>
          </div>
        </section>

        <!-- 已订业务 -->
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">已订业务</div>
            <div class="panel-tools">
              <span id="biz-count" class="badge"></span>
            </div>
          </div>

          <div id="biz-area">
            <div class="loading-row">
              <div class="spinner"></div>
              查询中...
            </div>
          </div>
        </section>

      </div>

      <footer class="footer">
        数据来自联通官方接口 · 本地反向代理转发
      </footer>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
