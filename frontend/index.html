<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联通余量面板</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <i class="fa-solid fa-signal"></i>
        <span>联通余量面板</span>
      </div>
      <div class="header-right" id="header-user" style="display: none;">
        <span class="phone-tag" id="header-phone"></span>
        <button onclick="logout()" class="btn-ghost">退出</button>
      </div>
    </div>
  </header>

  <!-- Login Page -->
  <div id="page-login" class="page-center">
    <div class="login-card">
      <div class="login-brand">
        <i class="fa-solid fa-mobile-screen-button fa-2x"></i>
      </div>
      <h1 class="login-title">欢迎登录</h1>
      <p class="login-sub">查询流量、速率、已订业务</p>

      <!-- Tab -->
      <div class="tab-switch">
        <button class="tab-btn active" onclick="switchLoginTab('sms', this)">短信验证</button>
        <button class="tab-btn" onclick="switchLoginTab('token', this)">Token 登录</button>
      </div>

      <!-- SMS Login -->
      <div id="login-sms">
        <div class="form-group">
          <label>手机号</label>
          <input type="tel" id="inp-phone" placeholder="请输入联通手机号" maxlength="11">
        </div>
        <div class="form-group" id="sms-code-group" style="display:none;">
          <label>验证码</label>
          <div class="row-gap">
            <input type="text" id="inp-code" placeholder="6位验证码" maxlength="6">
            <button id="btn-resend" class="btn-outline" onclick="sendSms()">重新发送</button>
          </div>
        </div>
        <button id="btn-sms-submit" class="btn-primary w-full" onclick="handleSmsLogin()">获取验证码</button>
        <div id="msg-sms" class="msg"></div>
      </div>

      <!-- Token Login -->
      <div id="login-token" style="display:none;">
        <div class="form-group">
          <label>手机号（可选）</label>
          <input type="tel" id="inp-token-phone" placeholder="用于区分账号">
        </div>
        <div class="form-group">
          <label>ECS Token</label>
          <input type="text" id="inp-token" placeholder="粘贴 ECS Token">
        </div>
        <button class="btn-primary w-full" onclick="handleTokenLogin()">验证并登录</button>
        <div id="msg-token" class="msg"></div>
        <div class="token-tip">
          Token 获取方式：Fiddler / Charles 抓包 → 搜索 <code>ecs_token</code> 或 <code>accessToken</code>
        </div>
      </div>

      <div class="login-note">仅本地运行 • 数据不上传服务器</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="page-dash" class="page-dash" style="display:none;">
    <div class="container">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📊 流量概览</h2>
          <button id="btn-refresh" class="btn-refresh" onclick="refreshAll()">
            <i class="fa-solid fa-arrows-rotate"></i> 刷新
          </button>
        </div>

        <!-- Summary -->
        <div class="summary-grid">
          <div class="summary-card accent">
            <div class="summary-val" id="s-remain">—</div>
            <div class="summary-label">剩余流量</div>
          </div>
          <div class="summary-card">
            <div class="summary-val" id="s-used">—</div>
            <div class="summary-label">已用流量</div>
          </div>
          <div class="summary-card">
            <div class="summary-val" id="s-total">—</div>
            <div class="summary-label">套餐总量</div>
          </div>
          <div class="summary-card">
            <div class="summary-val" id="s-pct">—</div>
            <div class="summary-label">使用率</div>
          </div>
        </div>

        <!-- Big Progress -->
        <div class="big-progress">
          <div class="big-bar-bg">
            <div class="big-bar-fill" id="main-bar" style="width:0%"></div>
          </div>
          <div class="bar-labels">
            <span id="bar-used-lbl">已用 —</span>
            <span id="bar-total-lbl">共 —</span>
          </div>
        </div>

        <div id="pkg-list" class="pkg-list">
          <!-- JS 动态渲染 -->
        </div>
      </div>

      <!-- Speed & QCI -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">🚀 5G 速率 & QCI</h2>
        </div>
        <div id="speed-area" class="speed-area">
          查询中...
        </div>
      </div>

      <!-- Business -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📋 已订业务</h2>
        </div>
        <div id="biz-area" class="biz-area">
          查询中...
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
