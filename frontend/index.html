<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联通余量面板</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">联通余量面板</div>
      <div class="header-right" id="header-user">
        <span class="phone-tag" id="header-phone">已登录</span>
        <button id="btn-logout">退出</button>
      </div>
    </div>
  </header>

  <main class="page-dash" id="page-dash">
    <div class="container">

      <!-- 顶部统计卡片 -->
      <section class="summary-grid">
        <div class="summary-card">
          <div class="summary-val" id="s-remain">—</div>
          <div class="summary-label">剩余流量</div>
          <div class="summary-progress">
            <div class="summary-progress-bar blue" id="s-remain-bar"></div>
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-val" id="s-used">—</div>
          <div class="summary-label">已用流量</div>
          <div class="summary-progress">
            <div class="summary-progress-bar amber" id="s-used-bar"></div>
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-val" id="s-total">—</div>
          <div class="summary-label">套餐总量</div>
          <div class="summary-progress">
            <div class="summary-progress-bar gray" id="s-total-bar"></div>
          </div>
        </div>

        <div class="summary-card accent">
          <div class="summary-val" id="s-pct">—</div>
          <div class="summary-label">使用率</div>
          <div class="summary-progress">
            <div class="summary-progress-bar" id="s-pct-bar"></div>
          </div>
        </div>
      </section>

      <!-- 流量余量 -->
      <section class="card">
        <div class="card-head">
          <h3>流量余量</h3>
          <button id="btn-refresh">刷新</button>
        </div>

        <div class="big-progress">
          <div class="big-progress-track">
            <div class="big-progress-bar" id="main-bar"></div>
          </div>
          <div class="big-progress-meta">
            <span id="bar-used-lbl">已用 —</span>
            <span id="bar-total-lbl">共 —</span>
          </div>
        </div>

        <div id="pkg-list">加载中...</div>
      </section>

      <section class="grid-2">
        <div class="card">
          <div class="card-head">
            <h3>速率 & QCI</h3>
          </div>
          <div>查询中...</div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3>已订业务</h3>
          </div>
          <div>查询中...</div>
        </div>
      </section>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
